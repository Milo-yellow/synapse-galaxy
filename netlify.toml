# 시냅스 은하 — Netlify 설정
#
# 빌드 시점에 build.mjs 가 Supabase에서 글을 불러와 dist/ 안에
# 홈(index.html) + 글마다 /post/<id>/index.html 정적 스냅샷을 만든다.
# (크롤러/봇/링크 미리보기가 자바스크립트 없이도 글 내용을 읽을 수 있게 하기 위함)
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA 폴백: 빌드 후 새로 쓴 글처럼 아직 정적 파일이 없는 주소는 index.html 로 보내
# 자바스크립트가 Supabase에서 직접 불러오게 한다.
# (이미 존재하는 정적 파일, 예: 빌드된 /post/123 은 Netlify가 이 규칙보다 먼저 그 파일을 서빙한다)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
